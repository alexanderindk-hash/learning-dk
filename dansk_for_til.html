<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for eller til — dansk træner</title>
<style>
  :root {
    --bg: #f7f6f2;
    --card: #ffffff;
    --text: #1a1a18;
    --muted: #6b6b66;
    --border: rgba(0,0,0,0.1);
    --for-color: #1a5fa8;
    --for-bg: #eaf1fb;
    --til-color: #0e6e52;
    --til-bg: #e5f3ee;
    --ok-bg: #e6f4ed;
    --ok-text: #0a5c3a;
    --ok-border: #9fd4b8;
    --bad-bg: #fdecea;
    --bad-text: #b03030;
    --bad-border: #f4b4b0;
    --progress: #1a5fa8;
    --radius: 14px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --card: #1e1e1b;
      --text: #e8e6de;
      --muted: #8a8a82;
      --border: rgba(255,255,255,0.1);
      --for-color: #7ab0f0;
      --for-bg: #0e1e33;
      --til-color: #5ecba0;
      --til-bg: #0a2419;
      --ok-bg: #0a2419;
      --ok-text: #5ecba0;
      --ok-border: #1a5c3a;
      --bad-bg: #2a1010;
      --bad-text: #f07070;
      --bad-border: #5a2020;
      --progress: #7ab0f0;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .container {
    width: 100%;
    max-width: 520px;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 4px 0 2px;
  }
  .title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .title span { color: var(--muted); font-weight: 400; }
  .score-chip { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .progress-wrap { position: relative; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--progress); border-radius: 2px; transition: width 0.35s ease; }
  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 20px 18px 18px; }
  .ex-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .sentence-da { font-size: 18px; line-height: 1.75; margin-bottom: 10px; }
  .divider { height: 0.5px; background: var(--border); margin: 10px 0; }
  .sentence-ru { font-size: 14px; color: var(--muted); line-height: 1.65; }
  .blank { display: inline-block; min-width: 54px; padding: 0 6px; border-bottom: 2px solid var(--border); text-align: center; font-weight: 600; vertical-align: bottom; transition: color 0.2s, border-color 0.2s; }
  .blank-ru { display: inline-block; min-width: 38px; padding: 0 4px; border-bottom: 1.5px dashed var(--border); text-align: center; vertical-align: bottom; }
  .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { padding: 16px 12px; border-radius: var(--radius-sm); border: 1.5px solid; background: transparent; font-size: 17px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; letter-spacing: 0.02em; }
  .btn:active { transform: scale(0.97); }
  .btn-for { border-color: var(--for-color); color: var(--for-color); }
  .btn-for:hover { background: var(--for-bg); }
  .btn-til { border-color: var(--til-color); color: var(--til-color); }
  .btn-til:hover { background: var(--til-bg); }
  .btn:disabled { opacity: 0.3; cursor: default; transform: none; }
  .feedback { border-radius: var(--radius-sm); padding: 14px 16px; font-size: 14px; line-height: 1.65; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .feedback b { font-weight: 600; }
  .feedback.ok { background: var(--ok-bg); color: var(--ok-text); border: 0.5px solid var(--ok-border); }
  .feedback.bad { background: var(--bad-bg); color: var(--bad-text); border: 0.5px solid var(--bad-border); }
  .next-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; font-size: 15px; cursor: pointer; color: var(--muted); transition: background 0.15s; }
  .next-btn:hover { background: var(--border); }
  .next-btn:active { transform: scale(0.98); }
  .done { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; padding: 40px 0; }
  .done-emoji { font-size: 48px; margin-bottom: 8px; }
  .done-score { font-size: 42px; font-weight: 700; letter-spacing: -0.02em; }
  .done-label { color: var(--muted); font-size: 15px; margin-bottom: 4px; }
  .done-msg { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
  .restart-btn { padding: 13px 32px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: transparent; font-size: 15px; font-weight: 500; cursor: pointer; color: var(--text); transition: background 0.15s; }
  .restart-btn:hover { background: var(--border); }
  @media (max-width: 380px) {
    .sentence-da { font-size: 16px; }
    .btn { font-size: 16px; padding: 14px 8px; }
  }
</style>
</head>

<script>
const items = [

  { ex:"Øvelse 1", da_b:"Hvad skal vi have", da_a:"middag?", ru_b:"Что у нас будет", ru_a:"ужин?", ans:"til", ru_ans:"на", explain:"<b>til middag</b> — «на обед/ужин». Назначение еды → til." },
  { ex:"Øvelse 1", da_b:"Er du glad", da_a:"din nye lejlighed?", ru_b:"Ты рад", ru_a:"свою новую квартиру?", ans:"for", ru_ans:"за", explain:"<b>glad for</b> — устойчивое: быть радым чему-то → for." },
  { ex:"Øvelse 1", da_b:"Du skal ikke være bange", da_a:"hunden, den gør ikke noget.", ru_b:"Не бойся", ru_a:"собаку, она ничего не сделает.", ans:"for", ru_ans:"—", explain:"<b>bange for</b> — бояться чего-то. Причина страха → for." },
  { ex:"Øvelse 1", da_b:"Vil du med", da_a:"København i week-enden?", ru_b:"Поедешь с нами", ru_a:"Копенгаген на выходных?", ans:"til", ru_ans:"в", explain:"<b>til + место</b> — направление («в Копенгаген») → til." },
  { ex:"Øvelse 1", da_b:"Det har ikke været muligt", da_a:"mig at skaffe billetter.", ru_b:"Мне не удалось", ru_a:"достать билеты.", ans:"for", ru_ans:"—", explain:"<b>muligt for mig</b> — возможно для меня. Кому → for." },
  { ex:"Øvelse 1", da_b:"Han var for træt", da_a:"at gå med.", ru_b:"Он был слишком устал", ru_a:"идти с нами.", ans:"til", ru_ans:"чтобы", explain:"<b>for [прил.] til at</b> — «слишком … чтобы». Конструкция всегда for...til at." },
  { ex:"Øvelse 1", da_b:"Jeg vil ikke give 300 kr.", da_a:"en brugt cykel.", ru_b:"Я не дам 300 крон", ru_a:"подержанный велосипед.", ans:"for", ru_ans:"за", explain:"<b>give penge for</b> — заплатить/дать деньги за что-то → for." },
  { ex:"Øvelse 1", da_b:"Tror du, det vil lykkes", da_a:"mig at finde noget bedre arbejde?", ru_b:"Думаешь, мне удастся", ru_a:"найти работу получше?", ans:"for", ru_ans:"—", explain:"<b>lykkes for nogen</b> — удаться кому-то → for." },
  { ex:"Øvelse 1", da_b:"Desværre fik han ikke lejlighed", da_a:"at møde dem igen inden de rejste.", ru_b:"К сожалению, у него не было возможности", ru_a:"встретиться с ними до отъезда.", ans:"til", ru_ans:"—", explain:"<b>lejlighed til at</b> — возможность сделать что-то → til." },

  { ex:"Øvelse 1", da_b:"Jeg synes, du har mistet evne", da_a:"at se tingene fra en humoristisk side.", ru_b:"Мне кажется, ты утратил способность", ru_a:"видеть вещи с юмористической стороны.", ans:"til", ru_ans:"—", explain:"<b>evne til at</b> — способность что-то делать → til." },
  { ex:"Øvelse 1", da_b:"Har du penge nok", da_a:"billetten?", ru_b:"У тебя хватит денег", ru_a:"билет?", ans:"til", ru_ans:"на", explain:"<b>penge til</b> — денег на что-то. Назначение денег → til." },
  { ex:"Øvelse 1", da_b:"Hvad skal du bruge en hammer", da_a:"?", ru_b:"Зачем тебе молоток?", ru_a:"", ans:"til", ru_ans:"—", explain:"<b>bruge til</b> — использовать для чего-то. Назначение → til." },
  { ex:"Øvelse 1", da_b:"Vi har aldrig haft råd", da_a:"en sådan rejse.", ru_b:"У нас никогда не было средств", ru_a:"такое путешествие.", ans:"til", ru_ans:"на", explain:"<b>råd til</b> — средства на что-то. Финансовая возможность → til." },
  { ex:"Øvelse 1", da_b:"Han har ret", da_a:"2-ugers ferie hvert år.", ru_b:"Он имеет право", ru_a:"двухнедельный отпуск каждый год.", ans:"til", ru_ans:"на", explain:"<b>ret til</b> — право на что-то → til." },
  { ex:"Øvelse 1", da_b:"Hun er hurtig", da_a:"at skrive.", ru_b:"Она быстро печатает.", ru_a:"", ans:"til", ru_ans:"—", explain:"<b>hurtig til at</b> — быстрый в чём-то, хорошо умеет → til." },
  { ex:"Øvelse 1", da_b:"Er du parat", da_a:"at tage af sted?", ru_b:"Ты готов", ru_a:"отправиться?", ans:"til", ru_ans:"—", explain:"<b>parat til at</b> — готов сделать что-то → til." },
  { ex:"Øvelse 1", da_b:"Jeg er helt klar", da_a:"at gå.", ru_b:"Я полностью готов", ru_a:"идти.", ans:"til", ru_ans:"—", explain:"<b>klar til at</b> — готов к тому чтобы → til." },
  { ex:"Øvelse 1", da_b:"Det er meget vigtigt", da_a:"mig, at du tager med.", ru_b:"Мне очень важно", ru_a:"чтобы ты пошёл с нами.", ans:"for", ru_ans:"для", explain:"<b>vigtigt for mig</b> — важно для меня → for." },

  // ===== ØVELSE 2 =====
  { ex:"Øvelse 2", da_b:"Der er telefon", da_a:"dig.", ru_b:"Тебя", ru_a:"к телефону.", ans:"til", ru_ans:"—", explain:"<b>telefon til dig</b> — звонок тебе. Получатель → til." },

  { ex:"Øvelse 2", da_b:"Jeg købte noget stof", da_a:"en kjole.", ru_b:"Я купила ткань", ru_a:"платье.", ans:"til", ru_ans:"на", explain:"<b>stof til en kjole</b> — ткань на платье. Назначение → til." },
  { ex:"Øvelse 2", da_b:"Hun havde ikke mad", da_a:"sine børn.", ru_b:"У неё не было еды", ru_a:"детей.", ans:"til", ru_ans:"для", explain:"<b>mad til børn</b> — еда для детей. Назначение → til." },
  { ex:"Øvelse 2", da_b:"", da_a:"børn er turen gratis.", ru_b:"Для детей поездка бесплатна.", ru_a:"", ans:"for", ru_ans:"Для", explain:"<b>For børn</b> — для детей (кому это касается/в чью пользу) → for." },

  { ex:"Øvelse 2", da_b:"Han blev en god far", da_a:"hendes børn.", ru_b:"Он стал хорошим отцом", ru_a:"её детей.", ans:"for", ru_ans:"для", explain:"<b>far for børn</b> — отец для детей (в их пользу). Польза → for." },
  { ex:"Øvelse 2", da_b:"Hun underviser i gymnastik", da_a:"kvinder.", ru_b:"Она ведёт гимнастику", ru_a:"женщин.", ans:"for", ru_ans:"для", explain:"<b>undervise for</b> — преподавать для кого-то (аудитория) → for." },
  { ex:"Øvelse 2", da_b:"Min far arbejder", da_a:"et firma.", ru_b:"Мой отец работает", ru_a:"компанию.", ans:"for", ru_ans:"на", explain:"<b>arbejde for</b> — работать на кого-то → for." },
  { ex:"Øvelse 2", da_b:"Da hun var på ferie, passede jeg hendes hund", da_a:"hende.", ru_b:"Пока она была в отпуске, я присматривал за её собакой", ru_a:"неё.", ans:"for", ru_ans:"для/вместо", explain:"<b>passe hund for nogen</b> — присматривать за собакой для кого-то, вместо кого-то → for." },
  { ex:"Øvelse 2", da_b:"Kan jeg gøre noget", da_a:"dig?", ru_b:"Могу я что-нибудь сделать", ru_a:"тебя?", ans:"for", ru_ans:"для", explain:"<b>gøre noget for nogen</b> — сделать что-то для кого-то → for." },
  { ex:"Øvelse 2", da_b:"Hun lavede mad", da_a:"gæsterne.", ru_b:"Она приготовила еду", ru_a:"гостей.", ans:"til", ru_ans:"для", explain:"<b>mad til gæsterne</b> — еда для гостей. Назначение → til." },

  { ex:"Øvelse 2", da_b:"Jeg fik en tegning, som Peter havde tegnet", da_a:"mig.", ru_b:"Я получила рисунок, который Питер нарисовал", ru_a:"меня.", ans:"til", ru_ans:"для", explain:"<b>tegne til nogen</b> — нарисовать и отдать кому-то. Получатель → til." },

  { ex:"Øvelse 3", da_b:"Jeg er ikke i stand", da_a:"at betale.", ru_b:"Я не в состоянии", ru_a:"заплатить.", ans:"til", ru_ans:"—", explain:"<b>i stand til at</b> — в состоянии сделать что-то. Фиксированная конструкция → til." },

  { ex:"Øvelse 3", da_b:"Skal vi ikke leje et sommerhus", da_a:"sommeren?", ru_b:"Может, снимем летний домик", ru_a:"лето?", ans:"til", ru_ans:"на", explain:"<b>til sommeren</b> — на лето (временной период) → til." },
  { ex:"Øvelse 3", da_b:"Barnet bliver højere år", da_a:"år.", ru_b:"Ребёнок становится выше — год", ru_a:"годом.", ans:"for", ru_ans:"за", explain:"<b>år for år</b> — год за годом. Идиоматическое повторение → for." },
  { ex:"Øvelse 3", da_b:"Han oversætter dansk prosa", da_a:"polsk.", ru_b:"Он переводит датскую прозу", ru_a:"польский.", ans:"til", ru_ans:"на", explain:"<b>oversætte til</b> — переводить на (язык). Направление → til." },
  { ex:"Øvelse 3", da_b:"Må jeg have et stykke", da_a:"?", ru_b:"Можно мне кусочек?", ru_a:"", ans:"til", ru_ans:"—", explain:"<b>et stykke til</b> — ещё кусочек (добавки). til = ещё/дополнительно → til." },
  { ex:"Øvelse 3", da_b:"Han gjorde det på grund af sin kærlighed", da_a:"børn.", ru_b:"Он сделал это из-за своей любви", ru_a:"детям.", ans:"til", ru_ans:"к", explain:"<b>kærlighed til</b> — любовь к кому-то/чему-то → til." },
  { ex:"Øvelse 3", da_b:"Jeg har mest tillid", da_a:"hendes bedstemor.", ru_b:"Я больше всего доверяю", ru_a:"её бабушке.", ans:"til", ru_ans:"—", explain:"<b>tillid til</b> — доверие к кому-то → til." },
  { ex:"Øvelse 3", da_b:"Hans slips og skjorte svarer altid", da_a:"hinanden.", ru_b:"Его галстук и рубашка всегда подходят", ru_a:"другу.", ans:"til", ru_ans:"друг к", explain:"<b>svare til</b> — соответствовать чему-то, подходить → til." },

  { ex:"Øvelse 3", da_b:"Hele beløbet gik", da_a:"at betale gælden.", ru_b:"Вся сумма ушла", ru_a:"погашение долга.", ans:"til", ru_ans:"на", explain:"<b>gå til at</b> — уйти на что-то (о деньгах/ресурсах). Назначение → til." },

  { ex:"Øvelse 3", da_b:"De var også med", da_a:"at løse de unges problemer.", ru_b:"Они тоже участвовали", ru_a:"решении проблем молодёжи.", ans:"til", ru_ans:"в", explain:"<b>med til at</b> — участвовать в том чтобы сделать что-то → til." },
];

let current = 0, correct = 0, wrong = 0, answered = false;
let order = [];

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render() {
  const app = document.getElementById('app');
  const item = items[order[current]];
  const total = items.length;
  const pct = Math.round((current / total) * 100);
  app.innerHTML = `
    <header>
      <div class="title">for <span>/</span> til</div>
      <div class="score-chip">✓ ${correct} &nbsp; ✗ ${wrong}</div>
    </header>
    <div class="progress-wrap">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="card">
      <div class="ex-tag">${item.ex} &nbsp;·&nbsp; ${current + 1} / ${total}</div>
      <div class="sentence-da">
        ${item.da_b} <span id="bda" class="blank" style="color:var(--muted);border-color:var(--border)">___</span> ${item.da_a}
      </div>
      <div class="divider"></div>
      <div class="sentence-ru">
        ${item.ru_b} <span id="bru" class="blank-ru">___</span> ${item.ru_a || ''}
      </div>
    </div>
    <div class="btns">
      <button class="btn btn-for" id="btn-for" onclick="answer('for')">for</button>
      <button class="btn btn-til" id="btn-til" onclick="answer('til')">til</button>
    </div>
    <div id="feedback-area"></div>
    <button class="next-btn" id="next-btn" onclick="next()" style="display:none">Следующее →</button>
  `;
}

function answer(chosen) {
  if (answered) return;
  answered = true;
  const item = items[order[current]];
  document.getElementById('btn-for').disabled = true;
  document.getElementById('btn-til').disabled = true;
  const isOk = chosen === item.ans;
  if (isOk) correct++; else wrong++;
  const bda = document.getElementById('bda');
  bda.textContent = item.ans;
  bda.style.color = item.ans === 'for' ? (isOk ? 'var(--for-color)' : 'var(--bad-text)') : (isOk ? 'var(--til-color)' : 'var(--bad-text)');
  bda.style.borderColor = bda.style.color;
  document.getElementById('bru').textContent = item.ru_ans !== '—' ? item.ru_ans : item.ans;
  document.getElementById('feedback-area').innerHTML = `
    <div class="feedback ${isOk ? 'ok' : 'bad'}">
      ${isOk ? '✓ Верно! &nbsp;' : `✗ Нет, правильно <b>${item.ans}</b>. &nbsp;`}${item.explain}
    </div>`;
  document.getElementById('next-btn').style.display = 'block';
}

function next() {
  current++;
  answered = false;
  if (current >= items.length) renderDone();
  else render();
}

function renderDone() {
  const pct = Math.round(correct / items.length * 100);
  const emoji = pct === 100 ? '🏆' : pct >= 80 ? '💪' : pct >= 60 ? '📖' : '🔄';
  const msg = pct === 100 ? 'Идеально!' : pct >= 80 ? 'Отлично, почти всё!' : pct >= 60 ? 'Неплохо, есть над чем поработать.' : 'Стоит повторить — пробуй ещё раз.';
  document.getElementById('app').innerHTML = `
    <div class="done">
      <div class="done-emoji">${emoji}</div>
      <div class="done-score">${correct} / ${items.length}</div>
      <div class="done-label">правильных ответов</div>
      <div class="done-msg">${msg} (${pct}%)</div>
      <button class="restart-btn" onclick="restart()">Начать заново</button>
    </div>`;
}

function restart() {
  current = 0; correct = 0; wrong = 0; answered = false;
  order = shuffle([...Array(items.length).keys()]);
  render();
}

order = shuffle([...Array(items.length).keys()]);
render();
</script>
